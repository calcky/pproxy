# clab 端到端性能回归（需 self-hosted runner + KVM + containerlab）
name: clab-perf

on:
  workflow_dispatch:
    inputs:
      flamegraph:
        description: 'Collect leaf1/leaf2 perf profiles and speedscope JSON'
        required: false
        type: boolean
        default: false
      flame_duration:
        description: 'perf record duration in seconds when flamegraph is enabled'
        required: false
        type: string
        default: '5'
  schedule:
    - cron: '0 4 * * 0'

concurrency:
  group: clab-perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    name: clab perf (ci scenarios)
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-yaml sshpass curl iproute2 iperf3
          if ! command -v containerlab >/dev/null 2>&1; then
            echo "containerlab must be preinstalled on self-hosted runner" >&2
            exit 1
          fi

      - name: Build pproxy (xdp + pcap + io-uring)
        run: ./build.sh --native --xdp --pcap --io-uring

      - name: Run clab perf CI scenarios
        run: |
          chmod +x tests/clab/perf.sh tests/clab/perf/*.sh
          extra=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.flamegraph }}" == "true" ]]; then
            extra+=(--flamegraph --flame-duration "${{ inputs.flame_duration }}")
          fi
          tests/clab/perf.sh --ci --fail-on-threshold "${extra[@]}"

      - name: Summarize flamegraphs
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          manifests = sorted(Path("tests/clab/results/flamegraphs").glob("*/manifest.json"))
          if not manifests:
              raise SystemExit(0)

          print("## Flamegraphs")
          print()
          print("Download the `clab-perf-results` artifact and open each `*.speedscope.json` in https://www.speedscope.app/.")
          print()
          print("| run | leaf1 samples | leaf2 samples | manifest |")
          print("| --- | ---: | ---: | --- |")
          for manifest in manifests:
              data = json.loads(manifest.read_text(encoding="utf-8"))
              leaves = data.get("leaves") or {}
              row = [data.get("run_id") or manifest.parent.name]
              for leaf in ("leaf1", "leaf2"):
                  summary = (leaves.get(leaf) or {}).get("summary") or {}
                  row.append(str(summary.get("samples", 0)))
              row.append(str(manifest))
              print(f"| {row[0]} | {row[1]} | {row[2]} | `{row[3]}` |")
          PY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clab-perf-results
          path: tests/clab/results/
          if-no-files-found: warn
